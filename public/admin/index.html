<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>林一设计 · 管理后台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;padding:40px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);width:360px}
.login-box h2{text-align:center;margin-bottom:24px;font-size:1.3rem;color:#2c2c2c}
.login-box input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:4px;font-size:.9rem;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:#b8a088}
.login-box button{width:100%;padding:12px;background:#2c2c2c;color:#fff;border:none;border-radius:4px;font-size:.9rem;cursor:pointer;transition:background .3s}
.login-box button:hover{background:#b8a088}
.login-box .error{color:#e74c3c;font-size:.8rem;margin-top:8px;text-align:center}

.admin-wrap{display:none;min-height:100vh}
.admin-header{background:#2c2c2c;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.admin-header h1{font-size:1rem;font-weight:500}
.admin-header .logout{color:#ccc;font-size:.8rem;cursor:pointer}
.admin-header .logout:hover{color:#fff}

.admin-nav{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px}
.admin-nav a{padding:14px 20px;color:#666;text-decoration:none;font-size:.85rem;border-bottom:2px solid transparent;transition:all .3s;cursor:pointer}
.admin-nav a:hover{color:#2c2c2c}
.admin-nav a.active{color:#2c2c2c;border-bottom-color:#b8a088;font-weight:500}

.admin-content{padding:24px;max-width:1200px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

.card{background:#fff;border-radius:6px;padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:1rem;margin-bottom:16px;color:#2c2c2c}

.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.8rem;color:#888;margin-bottom:4px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:4px;font-size:.85rem;outline:none;font-family:inherit}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:#b8a088}
.form-row textarea{height:80px;resize:vertical}
.form-row button{padding:10px 24px;background:#2c2c2c;color:#fff;border:none;border-radius:4px;font-size:.85rem;cursor:pointer}
.form-row button:hover{background:#b8a088}

.upload-area{border:2px dashed #ddd;border-radius:6px;padding:30px;text-align:center;cursor:pointer;transition:border-color .3s}
.upload-area:hover{border-color:#b8a088}
.upload-area p{color:#888;font-size:.85rem}
.upload-area.has-file{border-color:#b8a088;background:#faf8f6}

.data-table{width:100%;border-collapse:collapse;font-size:.85rem}
.data-table th,.data-table td{padding:12px;text-align:left;border-bottom:1px solid #eee}
.data-table th{font-weight:600;color:#888;font-size:.8rem}
.data-table td{color:#555}
.data-table tr:hover{background:#fafafa}
.data-table .msg-content{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table .badge{padding:2px 8px;border-radius:12px;font-size:.75rem}
.data-table .badge.show{background:#e8f5e9;color:#2e7d32}
.data-table .badge.hide{background:#ffebee;color:#c62828}
.data-table button{padding:4px 10px;border:none;border-radius:3px;font-size:.75rem;cursor:pointer;margin-right:4px}
.data-table .btn-toggle{background:#f0f0f0;color:#555}
.data-table .btn-toggle:hover{background:#e0e0e0}
.data-table .btn-del{background:#ffebee;color:#c62828}
.data-table .btn-del:hover{background:#ffcdd2}
.data-table .img-preview{width:60px;height:45px;object-fit:cover;border-radius:4px}

.empty{color:#999;text-align:center;padding:40px;font-size:.85rem}
.loading{color:#888;text-align:center;padding:40px;font-size:.85rem}
.alert{padding:12px 16px;border-radius:4px;margin-bottom:16px;font-size:.85rem}
.alert.success{background:#e8f5e9;color:#2e7d32}
.alert.error{background:#ffebee;color:#c62828}

/* Upload Preview Grid */
.upload-preview-grid{display:none;flex-wrap:wrap;gap:12px;margin-top:16px}
.upload-preview-grid.show{display:flex}
.upload-preview-item{position:relative;width:120px;height:120px;border:2px solid #ddd;border-radius:6px;overflow:hidden;cursor:grab;transition:border-color .2s,transform .2s}
.upload-preview-item:active{cursor:grabbing}
.upload-preview-item:hover{border-color:#b8a088}
.upload-preview-item.dragging{opacity:0.5;transform:scale(0.95)}
.upload-preview-item.drag-over{border-color:#b8a088;border-style:solid;background:#faf8f6}
.upload-preview-item img{width:100%;height:100%;object-fit:cover}
.upload-preview-item .preview-index{position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px}
.upload-preview-item .preview-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(200,20,20,0.8);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;line-height:22px;text-align:center;padding:0}
.upload-preview-item .preview-remove:hover{background:#c62828}

/* Sort Controls */
.sort-controls{display:flex;gap:16px;align-items:center;margin-bottom:16px}
.sort-controls label{font-size:.8rem;color:#888}
.sort-controls select{padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:.85rem}

/* Edit Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:8px;width:90%;max-width:800px;max-height:90vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;color:#2c2c2c}
.modal-close{width:32px;height:32px;border:none;background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:1.2rem;line-height:32px;color:#666}
.modal-close:hover{background:#e0e0e0}
.modal-content{padding:20px}

</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap" style="display:flex;">
  <div class="login-box">
    <h2>林一设计 · 管理后台</h2>
    <input type="password" id="token-input" placeholder="输入管理密码" />
    <button onclick="doLogin()">登录</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<!-- Admin -->
<div class="admin-wrap" id="admin-wrap" style="display:none;">
  <div class="admin-header">
    <h1>林一设计 · 管理后台</h1>
    <span class="logout" onclick="doLogout()">退出登录</span>
  </div>
  <div class="admin-nav">
    <a class="active" onclick="switchTab('contacts')">咨询留言</a>
    <a onclick="switchTab('messages')">留言板</a>
    <a onclick="switchTab('works')">作品管理</a>
    <a onclick="switchTab('upload')">上传作品</a>
    <a onclick="switchTab('about')">关于我</a>
    <a onclick="switchTab('content')">网站内容</a>
    <a onclick="switchTab('settings')">网站设置</a>
  </div>
  <div class="admin-content">

    <!-- Contacts -->
    <div class="panel active" id="panel-contacts">
      <div class="card">
        <h3>咨询留言列表</h3>
        <div id="contacts-loading" class="loading">加载中...</div>
        <div id="contacts-content"></div>
      </div>
    </div>

    <!-- Messages -->
    <div class="panel" id="panel-messages">
      <div class="card">
        <h3>留言板管理</h3>
        <div id="messages-loading" class="loading">加载中...</div>
        <div id="messages-content"></div>
      </div>
    </div>

    <!-- Works -->
    <div class="panel" id="panel-works">
      <div class="card">
        <h3>作品列表</h3>
        <div class="sort-controls">
          <label>排序方式：</label>
          <select id="works-sort" onchange="loadWorks()">
            <option value="created_at_desc" selected>创建时间（最新）</option>
            <option value="created_at_asc">创建时间（最早）</option>
            <option value="year_desc">年份（降序）</option>
            <option value="year_asc">年份（升序）</option>
            <option value="title_asc">标题（A-Z）</option>
            <option value="title_desc">标题（Z-A）</option>
          </select>
        </div>
        <div id="works-loading" class="loading">加载中...</div>
        <div id="works-content"></div>
      </div>
    </div>

    <!-- Upload -->
    <div class="panel" id="panel-upload">
      <div class="card">
        <h3>上传新作品</h3>
        <div class="form-row">
          <label>作品标题</label>
          <input type="text" id="w-title" placeholder="例如：光影之间 · 私宅" />
        </div>
        <div class="form-row">
          <label>分类</label>
          <select id="w-category">
            <option value="私宅">私宅</option>
            <option value="商业">商业</option>
            <option value="办公">办公</option>
          </select>
        </div>
        <div class="form-row">
          <label>年份</label>
          <input type="text" id="w-year" placeholder="2024" />
        </div>
        <div class="form-row">
          <label>标签（空格分隔）</label>
          <input type="text" id="w-tags" placeholder="现代 白墙 光影 153㎡" />
        </div>
        <div class="form-row">
          <label>描述</label>
          <textarea id="w-desc" placeholder="简短描述"></textarea>
        </div>
        <div class="form-row">
          <label>作品图片（最多9张）</label>
          <div class="upload-area" id="upload-area" onclick="document.getElementById('w-file').click()">
            <p id="upload-hint">点击选择图片，或拖拽图片到此处（可多选）</p>
          </div>
          <input type="file" id="w-file" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this)" />
          <div class="upload-preview-grid" id="upload-preview-grid"></div>
        </div>
        <div class="form-row">
          <button onclick="doUpload()">上传作品</button>
        </div>
        <div id="upload-msg"></div>
      </div>
    </div>

    <!-- About -->
    <div class="panel" id="panel-about">
      <div class="card">
        <h3>关于我 · 编辑</h3>
        <div class="form-row">
          <label>个人照片</label>
          <div class="upload-area has-file" id="about-upload-area" onclick="document.getElementById('about-file').click()" style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden">
            <img id="about-preview" src="" style="max-width:100%;max-height:100%;object-fit:contain;display:none" />
            <p id="about-upload-hint">点击上传照片</p>
          </div>
          <input type="file" id="about-file" accept="image/*" style="display:none" onchange="handleAboutPhoto(this)" />
        </div>
        <div class="form-row">
          <label>个人介绍 第一段</label>
          <textarea id="about-intro1" style="height:60px"></textarea>
        </div>
        <div class="form-row">
          <label>个人介绍 第二段</label>
          <textarea id="about-intro2" style="height:60px"></textarea>
        </div>
        <div class="form-row">
          <label>个人介绍 第三段</label>
          <textarea id="about-intro3" style="height:60px"></textarea>
        </div>
        <div style="display:flex;gap:16px">
          <div class="form-row" style="flex:1">
            <label>经验年限</label>
            <input type="text" id="about-stat-years" placeholder="8+" />
          </div>
          <div class="form-row" style="flex:1">
            <label>落地项目数</label>
            <input type="text" id="about-stat-projects" placeholder="60+" />
          </div>
          <div class="form-row" style="flex:1">
            <label>好评率</label>
            <input type="text" id="about-stat-satisfaction" placeholder="100%" />
          </div>
        </div>
        <div class="form-row">
          <button onclick="saveAbout()">保存修改</button>
        </div>
        <div id="about-msg"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="panel" id="panel-content">
      <div class="card"><h3>头部 Hero</h3>
        <div class="form-row"><label>副标题</label><input type="text" id="ct-hero_subtitle" /></div>
        <div class="form-row"><label>主标题</label><input type="text" id="ct-hero_title" /></div>
        <div class="form-row"><label>描述</label><textarea id="ct-hero_desc" style="height:80px"></textarea></div>
      </div>
      <div class="card"><h3>关于我 · 副标题</h3>
        <div class="form-row"><label>小标题文字</label><input type="text" id="ct-about_subtitle" /></div>
      </div>
      <div class="card"><h3>设计理念</h3>
        <div class="form-row"><label>理念一 标题</label><input type="text" id="ct-phi_title1" /></div>
        <div class="form-row"><label>理念一 描述</label><textarea id="ct-phi_desc1" style="height:60px"></textarea></div>
        <div class="form-row"><label>理念二 标题</label><input type="text" id="ct-phi_title2" /></div>
        <div class="form-row"><label>理念二 描述</label><textarea id="ct-phi_desc2" style="height:60px"></textarea></div>
        <div class="form-row"><label>理念三 标题</label><input type="text" id="ct-phi_title3" /></div>
        <div class="form-row"><label>理念三 描述</label><textarea id="ct-phi_desc3" style="height:60px"></textarea></div>
      </div>
      <div class="card"><h3>服务内容</h3>
        <div class="form-row"><label>服务一 标题</label><input type="text" id="ct-svc_title1" /></div>
        <div class="form-row"><label>服务一 描述</label><textarea id="ct-svc_desc1" style="height:60px"></textarea></div>
        <div class="form-row"><label>服务二 标题</label><input type="text" id="ct-svc_title2" /></div>
        <div class="form-row"><label>服务二 描述</label><textarea id="ct-svc_desc2" style="height:60px"></textarea></div>
        <div class="form-row"><label>服务三 标题</label><input type="text" id="ct-svc_title3" /></div>
        <div class="form-row"><label>服务三 描述</label><textarea id="ct-svc_desc3" style="height:60px"></textarea></div>
      </div>
      <div class="card"><h3>联系信息</h3>
        <div class="form-row"><label>介绍语</label><input type="text" id="ct-contact_intro" /></div>
        <div class="form-row"><label>电话</label><input type="text" id="ct-contact_phone" /></div>
        <div class="form-row"><label>邮箱</label><input type="text" id="ct-contact_email" /></div>
        <div class="form-row"><label>地址</label><input type="text" id="ct-contact_address" /></div>
        <div class="form-row"><label>营业时间</label><input type="text" id="ct-contact_hours" /></div>
        <div class="form-row"><label>底部备注</label><input type="text" id="ct-contact_note" /></div>
      </div>
      <div class="card"><h3>页脚</h3>
        <div class="form-row"><label>微信公众号</label><input type="text" id="ct-footer_wechat" /></div>
        <div class="form-row"><label>小红书</label><input type="text" id="ct-footer_xhs" /></div>
        <div class="form-row"><label>Instagram</label><input type="text" id="ct-footer_ig" /></div>
        <div class="form-row"><label>版权信息</label><input type="text" id="ct-footer_copyright" /></div>
      </div>
      <div class="card">
        <div class="form-row"><button onclick="saveContent()">保存全部内容</button></div>
        <div id="content-msg"></div>
      </div>
    </div>

    <!-- Settings -->
    <div class="panel" id="panel-settings">
      <div class="card">
        <h3>网站设置</h3>
        <div style="margin-bottom:20px">
          <label style="font-size:.85rem;color:#555;display:block;margin-bottom:8px">留言板状态</label>
          <button id="btn-guestbook-toggle" style="padding:10px 24px;border:none;border-radius:4px;font-size:.85rem;cursor:pointer" onclick="toggleGuestbook()">加载中...</button>
          <span id="guestbook-status" style="margin-left:12px;font-size:.8rem;color:#888"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>编辑作品</h3>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-content">
      <div class="form-row">
        <label>作品标题</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-row">
        <label>分类</label>
        <select id="edit-category">
          <option value="私宅">私宅</option>
          <option value="商业">商业</option>
          <option value="办公">办公</option>
        </select>
      </div>
      <div class="form-row">
        <label>年份</label>
        <input type="text" id="edit-year" />
      </div>
      <div class="form-row">
        <label>标签（空格分隔）</label>
        <input type="text" id="edit-tags" />
      </div>
      <div class="form-row">
        <label>描述</label>
        <textarea id="edit-desc" style="height:80px"></textarea>
      </div>
      <div class="form-row">
        <label>现有图片（可拖拽排序，点击删除）</label>
        <div class="upload-preview-grid" id="edit-preview-grid"></div>
      </div>
      <div class="form-row">
        <label>添加新图片（可选，最多9张）</label>
        <div class="upload-area" id="edit-upload-area" onclick="document.getElementById('edit-file').click()">
          <p id="edit-upload-hint">点击选择图片，或拖拽图片到此处</p>
        </div>
        <input type="file" id="edit-file" accept="image/*" multiple style="display:none" onchange="handleEditFileSelect(this)" />
        <div class="upload-preview-grid" id="edit-new-preview-grid"></div>
      </div>
      <div class="form-row">
        <button onclick="doUpdate()">保存修改</button>
        <button onclick="closeEditModal()" style="background:#999;margin-left:8px">取消</button>
      </div>
      <div id="edit-msg"></div>
    </div>
  </div>
</div>

<script>
var token = '';
var API_BASE = window.location.origin;
var selectedFiles = [];

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  // Clear any previously saved token
  localStorage.removeItem('admin_token');
  
  // Ensure login form is shown by default
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
});

function doLogin() {
  var inputToken = document.getElementById('token-input').value.trim();
  var errorEl = document.getElementById('login-error');
  if (!inputToken) return;

  // Verify token with backend before showing admin panel
  fetch(API_BASE + '/api/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': inputToken },
    body: JSON.stringify({ action: 'verify', token: inputToken })
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      token = inputToken;
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('admin-wrap').style.display = 'block';
      document.getElementById('token-input').value = '';
      errorEl.textContent = '';
      loadAll();
    } else {
      errorEl.textContent = '密码错误，请重试';
    }
  }).catch(function() {
    errorEl.textContent = '网络错误，请稍后重试';
  });
}

function doLogout() {
  // Clear any previously saved token
  localStorage.removeItem('admin_token');
  token = '';
  location.reload();
}

function switchTab(name) {
  document.querySelectorAll('.admin-nav a').forEach(function(a) { a.classList.remove('active'); });
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
}

function apiPost(path, body) {
  return fetch(API_BASE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

function apiDelete(path, body) {
  return fetch(API_BASE + path, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// Load all data
function loadAll() {
  loadContacts();
  loadMessages();
  loadWorks();
  loadSettings();
  loadAbout();
  loadContent();
}

// Contacts
function loadContacts() {
  apiPost('/api/admin', { action: 'contacts', token: token }).then(function(res) {
    var el = document.getElementById('contacts-content');
    var loadEl = document.getElementById('contacts-loading');
    loadEl.style.display = 'none';
    if (!res.success || !res.data || res.data.length === 0) {
      el.innerHTML = '<div class="empty">暂无咨询留言</div>';
      return;
    }
    var html = '<table class="data-table"><thead><tr><th>时间</th><th>姓名</th><th>联系方式</th><th>项目类型</th><th>留言</th><th>操作</th></tr></thead><tbody>';
    res.data.forEach(function(c) {
      html += '<tr><td>' + formatDate(c.created_at) + '</td><td>' + esc(c.name) + '</td><td>' + esc(c.email) + '</td><td>' + esc(c.project_type || '-') + '</td><td>' + esc(c.message) + '</td><td><button class="btn-del" onclick="deleteContact(' + c.id + ')">删除</button></td></tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;

function loadWorks() {

    });
    html += '</tbody></table>';
    el.innerHTML = html;
  });
}

function sortWorks(works, sortBy) {
  var sorted = works.slice();
  switch(sortBy) {
    case 'created_at_desc':
      sorted.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
      break;
    case 'created_at_asc':
      sorted.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
      break;
    case 'year_desc':
      sorted.sort(function(a, b) { return (b.year || 0) - (a.year || 0); });
      break;
    case 'year_asc':
      sorted.sort(function(a, b) { return (a.year || 0) - (b.year || 0); });
      break;
    case 'title_asc':
      sorted.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); });
      break;
    case 'title_desc':
      sorted.sort(function(a, b) { return (b.title || '').localeCompare(a.title || ''); });
      break;
  }
  return sorted;
}

function handleFileSelect(input) {

function renderUploadPreviews() {
  var grid = document.getElementById('upload-preview-grid');
  var html = '';
  selectedFiles.forEach(function(file, i) {
    var url = URL.createObjectURL(file);
    html += '<div class="upload-preview-item" draggable="true" data-index="' + i + '" ondragstart="onUploadDragStart(event)" ondragover="onUploadDragOver(event)" ondragleave="onUploadDragLeave(event)" ondrop="onUploadDrop(event)">';

var dragIndex = -1;

function onUploadDragStart(e) {
  dragIndex = parseInt(e.target.closest('.upload-preview-item').dataset.index);
  e.target.closest('.upload-preview-item').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onUploadDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.target.closest('.upload-preview-item').classList.add('drag-over');
}

function onUploadDragLeave(e) {
  e.target.closest('.upload-preview-item').classList.remove('drag-over');
}

function onUploadDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  var targetItem = e.target.closest('.upload-preview-item');
  targetItem.classList.remove('drag-over');
  var targetIndex = parseInt(targetItem.dataset.index);
  if (dragIndex === targetIndex) return;
  // Reorder the files array
  var moved = selectedFiles.splice(dragIndex, 1)[0];
  selectedFiles.splice(targetIndex, 0, moved);
  document.querySelectorAll('.upload-preview-item.dragging').forEach(function(el) { el.classList.remove('dragging'); });
  renderUploadPreviews();
}

function removeUploadPreview(index) {
  selectedFiles.splice(index, 1);
  var area = document.getElementById('upload-area');
  var hint = document.getElementById('upload-hint');
  if (selectedFiles.length === 0) {
    area.classList.remove('has-file');
    hint.textContent = '点击选择图片，或拖拽图片到此处（可多选）';
    document.getElementById('upload-preview-grid').classList.remove('show');
    document.getElementById('upload-preview-grid').innerHTML = '';
  } else {
    hint.textContent = '已选择 ' + selectedFiles.length + ' 张图片（拖拽可调整顺序，叉号可删除）';
    renderUploadPreviews();
  }

function doUpload() {
  var msgEl = document.getElementById('upload-msg');
  if (selectedFiles.length === 0) {
    msgEl.innerHTML = '<div class="alert error">请先选择图片</div>';
    return;
  }

  msgEl.innerHTML = '<div class="alert" style="background:#fff3e0;color:#e65100">上传中... 0/' + selectedFiles.length + '</div>';

  // Read all files as base64 (使用 push + sort 避免稀疏数组问题)
  var total = selectedFiles.length;
  var results = [];
  var done = 0;
  var hasError = false;

  function tryFinish() {
    if (done < total) return;
    if (hasError) return;

    // 按原始索引排序，保证图片顺序正确
    results.sort(function(a, b) { return a.index - b.index; });

    var body = {
      title: document.getElementById('w-title').value || '未命名作品',
      category: document.getElementById('w-category').value,
      year: document.getElementById('w-year').value,
      tags: document.getElementById('w-tags').value,
      description: document.getElementById('w-desc').value,
      image_base64s: results.map(function(r) { return r.data; }),
      image_filenames: results.map(function(r) { return r.name; })
    };
    fetch(API_BASE + '/api/works', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json(); }).then(function(res) {
      if (res.success) {
        msgEl.innerHTML = '<div class="alert success">上传成功！共 ' + total + ' 张图片</div>';
        document.getElementById('w-title').value = '';
        document.getElementById('w-year').value = '';
        document.getElementById('w-tags').value = '';
        document.getElementById('w-desc').value = '';
        document.getElementById('w-file').value = '';
        selectedFiles = [];
        var area = document.getElementById('upload-area');
        area.classList.remove('has-file');
        document.getElementById('upload-hint').textContent = '点击选择图片，或拖拽图片到此处（可多选）';
        document.getElementById('upload-preview-grid').classList.remove('show');
        document.getElementById('upload-preview-grid').innerHTML = '';
        loadWorks();
      } else {
        msgEl.innerHTML = '<div class="alert error">上传失败：' + (res.error || '未知错误') + '</div>';
      }
    }).catch(function() {
      msgEl.innerHTML = '<div class="alert error">网络错误，请检查图片大小是否超过限制</div>';
    });
  }

  selectedFiles.forEach(function(file, i) {
    var reader = new FileReader();
    reader.onload = function(e) {
      results.push({ name: file.name, data: e.target.result, index: i });
      done++;
      msgEl.innerHTML = '<div class="alert" style="background:#fff3e0;color:#e65100">上传中... ' + done + '/' + total + '</div>';
      tryFinish();
    };
    reader.onerror = function() {
      done++;
      hasError = true;
      msgEl.innerHTML = '<div class="alert error">文件读取失败：' + file.name + '</div>';
    };
    reader.readAsDataURL(file);
  });
}

function formatDate(iso) {
  var d = new Date(iso);
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function pad(n) { return n < 10 ? '0' + n : n; }
function esc(s) {
  if (!s) return '';
  return s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

      results.sort(function(a, b) { return a.index - b.index; });
      sendUpdate(results.map(function(r) { return r.data; }), results.map(function(r) { return r.name; }));
    }
    
    editNewFiles.forEach(function(file, i) {
      var reader = new FileReader();
      reader.onload = function(e) {
        results.push({ name: file.name, data: e.target.result, index: i });
        done++;
        if (done === total) finish();
      };
      reader.onerror = function() {
        done++;
        if (done === total) finish();
      };
      reader.readAsDataURL(file);
    });
  } else {
    sendUpdate([], []);
  }
  
  function sendUpdate(newBases, newNames) {
    var body = {
      id: currentEditWork.id,
      title: document.getElementById('edit-title').value || currentEditWork.title,
      category: document.getElementById('edit-category').value,
      year: document.getElementById('edit-year').value,
      tags: document.getElementById('edit-tags').value,
      description: document.getElementById('edit-desc').value,
      deleted_urls: editDeletedImages,
      ordered_urls: editExistingImages,
      new_image_base64s: newBases,
      new_image_filenames: newNames
    };
    
    fetch(API_BASE + '/api/works', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json(); }).then(function(res) {
      if (res.success) {
        msgEl.innerHTML = '<div class="alert success">保存成功！</div>';
        setTimeout(function() {
          closeEditModal();
          loadWorks();
        }, 1000);
      } else {
        msgEl.innerHTML = '<div class="alert error">保存失败：' + (res.error || '未知错误') + '</div>';
      }
    }).catch(function() {
      msgEl.innerHTML = '<div class="alert error">网络错误</div>';
    });
  }
}
</script>
